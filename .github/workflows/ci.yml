name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        # Pinned: an unpinned ruff changes its default rule set between releases
        # (e.g. 0.16 expanded defaults), which would turn CI red with no code
        # change. Bump this deliberately when adopting newer rules.
        run: pip install "ruff==0.15.22"
      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests
        # Layer 2 uses a mock judge, so the full suite runs without any API key.
        run: pytest -v
